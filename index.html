<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sidexside — Social Media Creatives</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-font-smoothing:antialiased}
  body{font-family:'Inter',system-ui,sans-serif;background:#F8F8F8;color:#050505}
  header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);border-bottom:1px solid #E5E5E5;padding:18px 40px;display:flex;justify-content:space-between;align-items:center}
  header h1{font-size:22px;font-weight:800;letter-spacing:-1px;display:flex;align-items:center;gap:2px}
  header h1 .x{color:#BBB}
  header h1 .sub{font-weight:500;color:#999;margin-left:16px;font-size:14px;letter-spacing:0}
  .export-all{background:#000;color:#fff;border:none;border-radius:100px;padding:12px 28px;font-weight:700;font-size:14px;cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:-0.02em}
  .export-all:hover{background:#333}
  main{padding:40px;max-width:1400px;margin:0 auto}
  section{margin-bottom:56px}
  section h2{font-size:13px;font-weight:700;color:#999;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:20px}
  .grid{display:flex;flex-wrap:wrap;gap:20px}
  .carousel-row{display:flex;gap:16px;overflow-x:auto;padding-bottom:16px}
  .card{background:#fff;border-radius:20px;border:1px solid #E5E5E5;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
  .card-preview{overflow:hidden;position:relative}
  .card-bar{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid #F0F0F0}
  .card-bar span{font-size:13px;font-weight:600;color:#333}
  .export-btn{background:#000;color:#fff;border:none;border-radius:100px;padding:6px 16px;font-weight:600;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif}
  .export-btn:hover{background:#333}
  #status{font-size:13px;color:#000;font-weight:600;margin-right:16px}
  footer{border-top:1px solid #E5E5E5;padding:24px 40px;text-align:center;color:#999;font-size:13px}
</style>
</head>
<body>

<header>
  <h1>side<span class="x">x</span>side<span class="sub">Social Creatives</span></h1>
  <div style="display:flex;align-items:center">
    <span id="status"></span>
    <button class="export-all" onclick="exportAll()">Export All PNGs</button>
  </div>
</header>

<main>
  <section>
    <h2>Portrait Posts — 1080 × 1350</h2>
    <div class="grid" id="portrait-grid"></div>
  </section>
  <section>
    <h2>Square Posts — 1080 × 1080</h2>
    <div class="grid" id="square-grid"></div>
  </section>
  <section>
    <h2>Carousel — How It Works (5 Slides)</h2>
    <div class="carousel-row" id="carousel-row"></div>
  </section>
</main>

<footer>sidexside Social Media Creatives — 2026</footer>

<script>
const S = 0.33;
const Y = '#E6FF00';
const BK = '#000000';
const WH = '#FFFFFF';
const OW = '#F8F8F8';
const GY = '#999999';
const GL = '#D4D4D4';
const BD = '#E5E5E5';
const BL = '#076CC7';
const BLD = '#0558A3';
const F = "'Inter',system-ui,sans-serif";

function logo(color=BK, yc=GY) {
  return `<div style="font-family:${F};font-weight:800;font-size:22px;color:${color};letter-spacing:-1px;display:flex;align-items:center;gap:1px;">side<span style="color:${yc};">x</span>side</div>`;
}
function logoBar(pos='bottom', color=BK, yc=GY) {
  const p = pos==='top' ? 'top:0' : 'bottom:0';
  return `<div style="position:absolute;${p};left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:36px 48px;z-index:10;">
    ${logo(color, yc)}
    <div style="font-family:${F};font-weight:600;font-size:15px;color:${color};letter-spacing:-0.01em;opacity:0.5;">sidexside.ai</div>
  </div>`;
}
function pill(text, bg=BK, fg=WH) {
  return `<div style="display:inline-block;background:${bg};color:${fg};font-family:${F};font-weight:700;font-size:18px;padding:16px 36px;border-radius:100px;letter-spacing:-0.02em;">${text}</div>`;
}
function hl(text) {
  return `<span style="background:${Y};padding:0 8px;border-radius:6px;display:inline;color:${BK};">${text}</span>`;
}
function hlBlue(text) {
  return `<span style="background:${BL};padding:2px 10px;border-radius:6px;display:inline;color:${WH};">${text}</span>`;
}

// ═══════════════════════════════════════
// PORTRAIT POSTS (1080×1350)
// ═══════════════════════════════════════

// ── 01: The Last Few Blocks (White + yellow) ──
function post01() {
  return `<div data-export-name="post-01-last-few-blocks" style="width:1080px;height:1350px;background:${WH};position:relative;overflow:hidden;font-family:${F};">
    ${logoBar('top')}
    <div style="position:absolute;top:-80px;right:-120px;width:500px;height:500px;border-radius:50%;background:${Y};opacity:0.35;z-index:1;"></div>
    <div style="position:absolute;bottom:-60px;left:-80px;width:350px;height:350px;border-radius:50%;background:${BL};opacity:0.08;z-index:1;"></div>
    <div style="position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;justify-content:center;padding:140px 64px;z-index:5;">
      <div style="font-weight:600;font-size:15px;color:${BL};margin-bottom:24px;letter-spacing:0.06em;text-transform:uppercase;">You know the feeling</div>
      <h1 style="font-weight:800;font-size:82px;line-height:0.95;letter-spacing:-0.04em;color:${BK};margin:0;">
        The last<br>few blocks<br>${hl("don't have to")}<br>be the longest.
      </h1>
      <p style="font-weight:400;font-size:24px;color:#666;margin-top:28px;line-height:1.5;max-width:600px;">Someone's already going your way — right now.</p>
      <div style="margin-top:40px;">${pill('Walk together with sidexside')}</div>
    </div>
    ${logoBar('bottom')}
  </div>`;
}

// ── 02: Things We Don't Save (Black bg) ──
function post02() {
  function badge(label, emoji, pos) {
    return `<div style="position:absolute;${pos};background:${WH};border-radius:100px;padding:14px 24px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,0.15);z-index:8;">
      <div style="width:34px;height:34px;border-radius:10px;background:${Y};display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">${emoji}</div>
      <span style="font-family:${F};font-weight:700;font-size:17px;color:${BK};white-space:nowrap;">${label}</span>
    </div>`;
  }
  return `<div data-export-name="post-02-things-we-dont-save" style="width:1080px;height:1350px;background:${BK};position:relative;overflow:hidden;font-family:${F};">
    ${logoBar('top', WH, '#555')}
    <div style="position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;padding:130px 60px;z-index:5;">
      <h1 style="font-weight:800;font-size:64px;line-height:1.05;letter-spacing:-0.03em;color:${WH};text-align:center;margin:0 0 8px;">Things we<br>don't save:</h1>
      <p style="font-style:italic;font-size:38px;color:${Y};margin:0 0 56px;font-weight:500;">Everything.</p>
      <div style="position:relative;width:320px;height:520px;">
        <div style="width:100%;height:100%;background:${Y};border-radius:40px;position:relative;overflow:hidden;">
          <div style="position:absolute;top:14px;left:50%;transform:translateX(-50%);display:flex;gap:8px;align-items:center;">
            <div style="width:10px;height:10px;border-radius:50%;background:rgba(0,0,0,0.12);"></div>
            <div style="width:70px;height:5px;border-radius:3px;background:rgba(0,0,0,0.1);"></div>
          </div>
          <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:180px;height:180px;border-radius:50%;border:2px solid rgba(0,0,0,0.06);"></div>
          <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:130px;height:130px;border-radius:50%;border:2px solid rgba(0,0,0,0.08);"></div>
          <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80px;height:80px;border-radius:50%;border:2px solid rgba(0,0,0,0.1);"></div>
          <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:56px;height:56px;border-radius:50%;background:${BK};display:flex;align-items:center;justify-content:center;">
            <span style="color:${Y};font-size:24px;font-weight:800;">X</span>

        </div>

        ${badge('No chat logs','💬','top:230px;left:-130px')}
        ${badge('No user data','🔒','bottom:80px;right:-130px')}
      </div>
    </div>
    ${logoBar('bottom', WH, '#555')}
  </div>`;
}

// ── 03: Library Closes Late (Off-white, timeline) ──
function post03() {
  function step(emoji, title, subtitle, showLine=true) {
    return `<div style="display:flex;gap:20px;align-items:flex-start;">
      <div style="display:flex;flex-direction:column;align-items:center;">
        <div style="width:52px;height:52px;border-radius:16px;background:${Y};display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:1px solid rgba(0,0,0,0.05);">${emoji}</div>
        ${showLine ? `<div style="width:2px;height:44px;background:${BD};margin-top:8px;"></div>` : ''}
      </div>
      <div style="padding-top:6px;">
        <h3 style="font-weight:800;font-size:34px;color:${BK};margin:0;letter-spacing:-0.03em;line-height:1.1;">${title}</h3>
        <p style="font-weight:400;font-size:20px;color:${GY};margin:4px 0 0;line-height:1.3;">${subtitle}</p>
      </div>
    </div>`;
  }
  return `<div data-export-name="post-03-library-closes-late" style="width:1080px;height:1350px;background:${OW};position:relative;overflow:hidden;font-family:${F};">
    ${logoBar('top')}
    <div style="position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(circle at top right, rgba(7,108,199,0.08) 0%, transparent 50%);z-index:1;"></div>
    <div style="position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;justify-content:center;padding:140px 64px;z-index:5;">
      <div style="background:${WH};border:1px solid ${BD};border-radius:100px;padding:10px 24px;display:inline-flex;align-self:flex-start;margin-bottom:36px;box-shadow:0 2px 8px rgba(0,0,0,0.04);">

      </div>
      <div style="display:flex;flex-direction:column;gap:14px;">
        ${step('📚','Library closing.','12-minute walk to your dorm.')}
        ${step('<span style="color:#000;font-weight:800;font-size:18px;">X</span>','Open sidexside.','Match found.')}
        ${step('👤','Meet Maya.','West campus. Same direction.',false)}
      </div>
      <div style="margin-top:48px;border-top:3px solid ${BK};padding-top:28px;">
        <p style="font-weight:800;font-size:38px;color:${BK};margin:0;line-height:1.12;letter-spacing:-0.03em;">Now you're both walking home.</p>
        <p style="font-weight:500;font-size:26px;color:${GY};margin:10px 0 0;">And it's just... ${hl('lighter.')}</p>
      </div>
    </div>
    ${logoBar('bottom')}
  </div>`;
}

// ── 04: Not Another Safety App (White, bold statement) ──
function post04() {
  return `<div data-export-name="post-04-not-another-safety-app" style="width:1080px;height:1350px;background:${WH};position:relative;overflow:hidden;font-family:${F};">
    ${logoBar('top')}
    <div style="position:absolute;bottom:120px;right:-60px;width:400px;height:400px;border-radius:50%;background:${BL};opacity:0.06;z-index:1;"></div>
    <div style="position:absolute;top:0;left:0;right:0;bottom:120px;display:flex;flex-direction:column;justify-content:center;padding:140px 64px;z-index:5;">
      <h1 style="font-weight:800;font-size:74px;line-height:0.97;letter-spacing:-0.04em;color:${BK};margin:0;">
        We didn't<br>build another<br>${hl('safety')} app.
      </h1>
      <div style="width:60px;height:4px;background:${BL};margin:36px 0;border-radius:2px;"></div>
      <p style="font-weight:400;font-size:26px;color:#666;margin:0;line-height:1.45;max-width:700px;">
        We built one that gives you <span style="font-weight:700;color:${BK};">another woman going your way</span> — so the walk home feels lighter, not heavier.
      </p>
    </div>
    <div style="position:absolute;bottom:0;left:0;right:0;background:${BK};padding:32px 64px;display:flex;justify-content:space-between;align-items:center;z-index:10;">
      <p style="font-weight:600;font-size:18px;color:${WH};margin:0;line-height:1.3;">Safety should feel like<br>a deep breath, not a held one.</p>
      <p style="font-weight:700;font-size:16px;color:${GY};margin:0;">sidexside.ai</p>
    </div>
  </div>`;
}

// ── 05: Move Your Way (Blue bg, brand hero) ──
function post05Blue() {
  return `<div data-export-name="post-05-move-your-way" style="width:1080px;height:1350px;background:linear-gradient(160deg, ${BL} 0%, ${BLD} 100%);position:relative;overflow:hidden;font-family:${F};">
    ${logoBar('top', WH, 'rgba(255,255,255,0.4)')}
    <!-- Yellow circle accents -->
    <div style="position:absolute;top:-100px;right:-100px;width:450px;height:450px;border-radius:50%;background:${Y};opacity:0.15;z-index:1;"></div>
    <div style="position:absolute;bottom:100px;left:-80px;width:300px;height:300px;border-radius:50%;background:${Y};opacity:0.1;z-index:1;"></div>
    <div style="position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;justify-content:center;padding:140px 64px;z-index:5;">
      <div style="font-weight:600;font-size:15px;color:rgba(255,255,255,0.6);margin-bottom:20px;letter-spacing:0.08em;text-transform:uppercase;">Introducing</div>
      <h1 style="font-weight:900;font-size:90px;line-height:0.92;letter-spacing:-0.04em;color:${WH};margin:0;">
        Move<br>your<br><span style="background:${Y};padding:0 14px;border-radius:10px;color:${BK};">way.</span>
      </h1>
      <p style="font-weight:400;font-size:26px;color:rgba(255,255,255,0.75);margin-top:32px;line-height:1.45;max-width:650px;">
        Instantly match with another woman heading your direction. No planning. No tracking. Just go.
      </p>
      <div style="margin-top:44px;">${pill('Get started — sidexside.ai', Y, BK)}</div>
    </div>
    ${logoBar('bottom', WH, 'rgba(255,255,255,0.4)')}
  </div>`;
}

// ── 06: Someone's Going Your Way (Blue gradient) ──
function post06Blue() {
  return `<div data-export-name="post-06-someones-going-your-way" style="width:1080px;height:1350px;background:linear-gradient(180deg, #E8F4FF 0%, ${WH} 50%, #F0F7FF 100%);position:relative;overflow:hidden;font-family:${F};">
    ${logoBar('top', BL, 'rgba(7,108,199,0.3)')}
    <!-- Blue circle -->
    <div style="position:absolute;top:200px;right:-100px;width:500px;height:500px;border-radius:50%;background:${BL};opacity:0.06;z-index:1;"></div>
    <div style="position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:140px 64px;z-index:5;">
      <div style="background:${BL};color:${WH};font-weight:600;font-size:14px;padding:8px 20px;border-radius:100px;margin-bottom:32px;letter-spacing:0.02em;">RIGHT NOW, NEAR YOU</div>
      <h1 style="font-weight:800;font-size:76px;line-height:0.97;letter-spacing:-0.04em;color:${BK};margin:0;">
        Someone's<br>already going<br>${hlBlue('your way.')}
      </h1>
      <p style="font-weight:400;font-size:24px;color:#666;margin-top:28px;line-height:1.5;max-width:600px;">
        Open sidexside. Find your match. Walk together. It's that easy.
      </p>
      <div style="margin-top:40px;display:flex;gap:16px;">
        ${pill('Download the app', BK, WH)}
        ${pill('Learn more', WH, BK).replace('border-radius:100px;','border-radius:100px;border:2px solid #E5E5E5;')}
      </div>
    </div>
    ${logoBar('bottom', BK, GY)}
  </div>`;
}

// ── 07: Verified. Women-Only. (White bg, feature list) ──
function post07() {
  function feat(emoji, title, desc) {
    return `<div style="display:flex;align-items:flex-start;gap:20px;padding:22px 0;border-bottom:1px solid ${BD};">
      <div style="width:48px;height:48px;border-radius:14px;background:${Y};display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:1px solid rgba(0,0,0,0.05);">${emoji}</div>
      <div>
        <h3 style="font-weight:700;font-size:22px;color:${BK};margin:0;line-height:1.2;letter-spacing:-0.02em;">${title}</h3>
        <p style="font-weight:400;font-size:17px;color:${GY};margin:4px 0 0;line-height:1.4;">${desc}</p>
      </div>
    </div>`;
  }
  return `<div data-export-name="post-07-verified-women-only" style="width:1080px;height:1350px;background:${WH};position:relative;overflow:hidden;font-family:${F};">
    ${logoBar('top')}
    <div style="position:absolute;top:80px;right:-100px;width:400px;height:400px;border-radius:50%;background:${BL};opacity:0.05;z-index:1;"></div>
    <div style="position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;padding:130px 64px;z-index:5;">
      <h1 style="font-weight:800;font-size:58px;line-height:1.02;letter-spacing:-0.04em;color:${BK};margin:0 0 6px;">Verified.<br>${hl('Women-only.')}<br>Always.</h1>

        ${feat('💛','Post-trip pulse check','One bad vibe? They\'re out. We verify energy.')}
      </div>
      <div style="margin-top:28px;border-top:3px solid ${BK};padding-top:20px;">
        <p style="font-weight:600;font-size:20px;color:${BK};margin:0;text-align:center;">This is a women-only space. ${hl('And we keep it that way.')}</p>
      </div>
    </div>

// ── 08: Women Looking Out for Women (Light blue bg) ──
function post08Sisterhood() {
  return `<div data-export-name="post-08-sisterhood" style="width:1080px;height:1350px;background:linear-gradient(180deg, #EAF3FF 0%, ${WH} 100%);position:relative;overflow:hidden;font-family:${F};">

    <div style="position:absolute;bottom:-60px;right:-60px;width:400px;height:400px;border-radius:50%;background:${BL};opacity:0.07;z-index:1;"></div>

      <div style="margin-top:48px;display:flex;gap:24px;">
        <div style="text-align:center;">
          <div style="font-weight:900;font-size:48px;color:${BL};letter-spacing:-0.03em;">45-80%</div>
          <div style="font-weight:500;font-size:15px;color:${GY};margin-top:4px;">reduced perceived<br>risk with shared presence</div>

        <div style="width:1px;background:${BD};"></div>
        <div style="text-align:center;">

        </div>
      </div>
    </div>

// ── 09: No Planning Needed (White, feature highlight) ──
function post09NoPlan() {
  return `<div data-export-name="post-09-no-planning" style="width:1080px;height:1350px;background:${WH};position:relative;overflow:hidden;font-family:${F};">
    ${logoBar('top')}
    <div style="position:absolute;top:-50px;left:-50px;width:350px;height:350px;border-radius:50%;background:${Y};opacity:0.25;z-index:1;"></div>
    <div style="position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;justify-content:center;padding:140px 64px;z-index:5;">
      <h1 style="font-weight:800;font-size:72px;line-height:0.95;letter-spacing:-0.04em;color:${BK};margin:0 0 40px;">

// ═══════════════════════════════════════
// RENDER & EXPORT
// ═══════════════════════════════════════

function renderCard(html, title, w, h, container) {
  const pw=Math.round(w*S), ph=Math.round(h*S);
  const card=document.createElement('div');
  card.className='card';
  card.style.width=(pw+2)+'px';
  card.innerHTML=`
    <div class="card-preview" style="width:${pw}px;height:${ph}px;">
      <div style="transform:scale(${S});transform-origin:top left;width:${w}px;height:${h}px;">${html}</div>
    </div>
    <div class="card-bar">
      <span>${title}</span>
      <button class="export-btn" onclick="exportSingle(this)">Export</button>
    </div>`;
  container.appendChild(card);
}

async function doExport(el) {
  const name=el.getAttribute('data-export-name');
  const cont=document.createElement('div');
  cont.style.cssText='position:fixed;top:0;left:0;z-index:-9999;opacity:0;pointer-events:none;';
  document.body.appendChild(cont);
  const clone=el.cloneNode(true);
  clone.style.transform='none';
  cont.appendChild(clone);
  await new Promise(r=>setTimeout(r,200));
  try {
    const w=parseInt(clone.style.width), h=parseInt(clone.style.height);
    const canvas=await html2canvas(clone,{scale:2,useCORS:true,backgroundColor:null,width:w,height:h,windowWidth:w+100,windowHeight:h+100});
    const link=document.createElement('a');
    link.download=name+'.png';
    link.href=canvas.toDataURL('image/png');
    link.click();
  } catch(e){console.error(e);}
  document.body.removeChild(cont);
}

async function exportSingle(btn) {
  const el=btn.closest('.card').querySelector('[data-export-name]');
  if(!el) return;
  btn.textContent='...';
  await doExport(el);
  btn.textContent='Export';
}

async function exportAll() {
  const els=document.querySelectorAll('[data-export-name]');
  const st=document.getElementById('status');
  for(let i=0;i<els.length;i++){
    st.textContent=`Exporting ${i+1}/${els.length}...`;
    await doExport(els[i]);
    await new Promise(r=>setTimeout(r,700));
  }
  st.textContent=`Done! ${els.length} PNGs exported.`;
  setTimeout(()=>{st.textContent='';},4000);
}
